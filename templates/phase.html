{% extends "base.html" %}
{% block content %}
<div class="container" style="padding-top: 4rem;">
  <p class="section-label">설문 준비</p>
  <h1 class="page-title">어떤 시점의 설문인가요?</h1>
  <div class="divider"></div>

  <p class="text-gray" style="margin-bottom: 2rem;">
    같은 설문을 실험 전후에 실시하여 변화를 비교합니다.
  </p>

  <a href="/survey?phase=Phase1_before" class="card" style="display: block; text-decoration: none; border-left: 4px solid #00D4FF;">
    <p class="text-cyan" style="font-weight: 700; font-size: 1.2rem; margin-bottom: 0.3rem;">
      Phase 1 — Before (실험 전)
    </p>
    <p class="text-gray" style="font-size: 0.9rem;">
      4월 1~2주 · 기준선 측정 · AI Ops 도입 전/초기 상태
    </p>
  </a>

  <a href="/survey?phase=Phase3_after" class="card" style="display: block; text-decoration: none; border-left: 4px solid #FFD700;">
    <p class="text-yellow" style="font-weight: 700; font-size: 1.2rem; margin-bottom: 0.3rem;">
      Phase 3 — After (실험 후)
    </p>
    <p class="text-gray" style="font-size: 0.9rem;">
      5월 3~4주 · 최종 측정 · 실험 완료 후 변화 확인
    </p>
  </a>
</div>
{% endblock %}
