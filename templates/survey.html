<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAVE Survey</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: #faf9f7;
    color: #1a1a1a;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── Progress ── */
  .progress {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 4px; background: #e8e6e3;
  }
  .progress-fill {
    height: 100%; background: #6366f1; transition: width 0.4s ease;
  }
  .progress-info {
    position: fixed; top: 12px; right: 20px; z-index: 100;
    font-size: 13px; color: #9ca3af; font-weight: 500;
  }
  .back-btn {
    position: fixed; top: 10px; left: 20px; z-index: 100;
    font-size: 14px; color: #9ca3af; cursor: pointer;
    background: none; border: none; padding: 6px 12px; border-radius: 8px;
    transition: all 0.15s;
  }
  .back-btn:hover { background: #f0efec; color: #1a1a1a; }

  /* ── Slide container ── */
  .slides {
    height: 100vh; overflow: hidden; position: relative;
  }
  .slide {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 60px 24px 40px;
    opacity: 0; transform: translateY(30px);
    transition: all 0.35s ease;
    pointer-events: none;
    overflow-y: auto;
  }
  .slide.active {
    opacity: 1; transform: translateY(0);
    pointer-events: auto;
  }
  .slide-inner {
    max-width: 560px; width: 100%;
  }

  /* ── Typography ── */
  .q-part {
    font-size: 13px; font-weight: 600; color: #6366f1;
    margin-bottom: 8px; letter-spacing: 0.5px;
  }
  .q-text {
    font-size: 24px; font-weight: 700; line-height: 1.4;
    margin-bottom: 8px; color: #1a1a1a;
  }
  .q-sub {
    font-size: 15px; color: #6b7280; line-height: 1.5;
    margin-bottom: 32px;
  }

  /* ── Choice buttons ── */
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px; background: #fff;
    border: 1.5px solid #e5e3e0; border-radius: 12px;
    cursor: pointer; transition: all 0.15s;
    font-size: 15px; color: #374151; line-height: 1.4;
    min-height: 52px;
  }
  .choice:hover { border-color: #c7c5c2; background: #fefefe; }
  .choice.selected {
    border-color: #6366f1; background: #f0f0ff;
    color: #1a1a1a; font-weight: 500;
  }
  .choice-key {
    width: 28px; height: 28px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #9ca3af;
    border: 1.5px solid #e5e3e0; flex-shrink: 0;
    transition: all 0.15s;
  }
  .choice.selected .choice-key {
    background: #6366f1; color: #fff; border-color: #6366f1;
  }

  /* ── Likert scale (horizontal) ── */
  .likert-row {
    display: flex; gap: 8px; justify-content: center;
  }
  .likert-btn {
    flex: 1; max-width: 100px; padding: 20px 8px; text-align: center;
    background: #fff; border: 1.5px solid #e5e3e0; border-radius: 12px;
    cursor: pointer; transition: all 0.15s;
  }
  .likert-btn:hover { border-color: #c7c5c2; }
  .likert-btn.selected { border-color: #6366f1; background: #f0f0ff; }
  .likert-btn .l-num {
    font-size: 22px; font-weight: 700; color: #374151;
  }
  .likert-btn.selected .l-num { color: #6366f1; }
  .likert-btn .l-label {
    font-size: 11px; color: #9ca3af; margin-top: 4px;
  }

  /* ── Agency concept map ── */
  .agency-section {
    margin-top: 20px; padding-top: 16px; border-top: 1px solid #e8e6e3;
    opacity: 0; max-height: 0; overflow: hidden;
    transition: all 0.3s ease;
  }
  .agency-section.show {
    opacity: 1; max-height: 400px;
  }
  .agency-label {
    font-size: 14px; color: #374151; text-align: center;
    margin-bottom: 12px; font-weight: 500;
  }
  .cmap {
    position: relative; width: 280px; height: 220px; margin: 0 auto;
  }
  .cmap-center {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 52px; height: 52px; border-radius: 50%;
    background: #f0f0ff; border: 2px solid #6366f1;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; z-index: 2;
  }
  .cmap-line {
    position: absolute; background: #e5e3e0; z-index: 0;
  }
  .cmap-line-v { width: 2px; height: 50px; left: 50%; transform: translateX(-50%); }
  .cmap-line-h { height: 2px; width: 60px; top: 50%; transform: translateY(-50%); }
  .cmap-line.top { top: 18px; }
  .cmap-line.bottom { bottom: 18px; }
  .cmap-line.left { left: 30px; }
  .cmap-line.right { right: 30px; }
  .cmap-node {
    position: absolute; padding: 8px 14px;
    background: #fff; border: 1.5px solid #e5e3e0; border-radius: 10px;
    cursor: pointer; transition: all 0.15s;
    text-align: center; z-index: 1; white-space: nowrap;
  }
  .cmap-node:hover { border-color: #c7c5c2; background: #fefefe; }
  .cmap-node.selected { border-color: #6366f1; background: #f0f0ff; }
  .cmap-node.selected .cn-label { color: #6366f1; }
  .cmap-node .cn-emoji { font-size: 18px; display: block; margin-bottom: 2px; }
  .cmap-node .cn-label { font-size: 11px; color: #6b7280; font-weight: 500; }
  .cmap-node.selected .cn-label { font-weight: 600; }
  .cmap-node.n-top { top: 0; left: 50%; transform: translateX(-50%); }
  .cmap-node.n-bottom { bottom: 0; left: 50%; transform: translateX(-50%); }
  .cmap-node.n-left { left: 0; top: 50%; transform: translateY(-50%); }
  .cmap-node.n-right { right: 0; top: 50%; transform: translateY(-50%); }

  /* ── Text input ── */
  .text-input {
    width: 100%; min-height: 120px; padding: 16px;
    background: #fff; border: 1.5px solid #e5e3e0; border-radius: 12px;
    font-size: 15px; color: #1a1a1a; resize: vertical;
    font-family: inherit; line-height: 1.6;
    transition: border-color 0.15s;
  }
  .text-input:focus { outline: none; border-color: #6366f1; }
  .text-input::placeholder { color: #c7c5c2; }

  /* ── Info form ── */
  .info-grid { display: flex; flex-direction: column; gap: 24px; }
  .info-field label {
    display: block; font-size: 14px; font-weight: 600;
    color: #374151; margin-bottom: 10px;
  }
  .info-field input[type="text"] {
    width: 100%; padding: 12px 16px;
    background: #fff; color: #1a1a1a;
    border: 1.5px solid #e5e3e0; border-radius: 10px;
    font-size: 15px; font-family: inherit;
  }
  .info-field input:focus { outline: none; border-color: #6366f1; }
  .role-hint { font-size: 12px; color: #6366f1; margin-top: 6px; }

  /* Segmented buttons */
  .seg-group {
    display: flex; gap: 0; border: 1.5px solid #e5e3e0; border-radius: 10px; overflow: hidden;
  }
  .seg-btn {
    flex: 1; padding: 12px 8px; text-align: center;
    background: #fff; cursor: pointer; transition: all 0.15s;
    font-size: 14px; font-weight: 500; color: #6b7280;
    border-right: 1px solid #e5e3e0;
    font-family: inherit;
  }
  .seg-btn:last-child { border-right: none; }
  .seg-btn:hover { background: #faf9f7; }
  .seg-btn.selected { background: #6366f1; color: #fff; }
  .seg-btn input { display: none; }

  /* ── Buttons ── */
  .next-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 32px; background: #6366f1; color: #fff;
    border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; margin-top: 24px;
    font-family: inherit;
  }
  .next-btn:hover { background: #4f46e5; }
  .next-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .next-btn svg { width: 16px; height: 16px; }

  .skip-btn {
    display: block; margin-top: 16px;
    font-size: 13px; color: #9ca3af; cursor: pointer;
    background: none; border: none; font-family: inherit;
    transition: color 0.15s;
  }
  .skip-btn:hover { color: #6b7280; }

  /* ── Intro/Outro ── */
  .intro-icon { font-size: 48px; margin-bottom: 16px; }
  .intro-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  .intro-desc { font-size: 16px; color: #6b7280; line-height: 1.6; margin-bottom: 32px; }

  @media (max-width: 600px) {
    .q-text { font-size: 20px; }
    .info-grid { grid-template-columns: 1fr; }
    .likert-row { gap: 6px; }
    .likert-btn { padding: 16px 4px; }
    .likert-btn .l-num { font-size: 18px; }
  }
</style>
</head>
<body>

<!-- Progress -->
<div class="progress"><div class="progress-fill" id="progressFill" style="width:0%;"></div></div>
<div class="progress-info"><span id="roleBadge" style="display:none; background:#f0f0ff; color:#6366f1; font-weight:600; padding:2px 10px; border-radius:12px; font-size:11px; margin-right:8px;"></span><span id="progressCount"></span></div>
<button class="back-btn" id="backBtn" onclick="prevSlide()" style="display:none;">← 이전</button>

<form id="surveyForm" action="/submit" method="post">
<div class="slides" id="slides">

  <!-- ===== Slide 0: Intro ===== -->
  <div class="slide active" data-idx="0">
    <div class="slide-inner" style="text-align:center;">
      <div class="intro-icon">🔬</div>
      <h1 class="intro-title">CAVE AI Ops 설문</h1>
      <p class="intro-desc">
        우리 조직의 AI 활용 수준을 진단합니다.<br>
        총 42문항, 약 15분 소요됩니다.
      </p>
      <button type="button" class="next-btn" onclick="nextSlide()">
        시작하기
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <!-- ===== Slide 1: Demographics ===== -->
  <div class="slide" data-idx="1">
    <div class="slide-inner">
      <p class="q-part">응답자 정보</p>
      <p class="q-text">기본 정보를 알려주세요</p>
      <div class="info-grid">
        <div class="info-field">
          <label>닉네임</label>
          <input type="text" name="nickname" value="{{ user.nickname if user else '' }}" placeholder="닉네임을 입력해주세요" {% if user and user.email %}readonly{% endif %}>
        </div>
        <div class="info-field">
          <label>역할</label>
          <div class="seg-group" id="seg-role">
            <div class="seg-btn" onclick="pickSeg('role','리더',this)">리더<input type="radio" name="role" value="리더"></div>
            <div class="seg-btn" onclick="pickSeg('role','구성원',this)">구성원<input type="radio" name="role" value="구성원"></div>
          </div>
          <p class="role-hint">역할에 따라 주체 방향 선택지가 달라집니다</p>
        </div>
        <div class="info-field">
          <label>조직 규모</label>
          <div class="seg-group">
            <div class="seg-btn" onclick="pickSeg('org_size','~10명',this)">~10명<input type="radio" name="org_size" value="~10명"></div>
            <div class="seg-btn" onclick="pickSeg('org_size','11~30명',this)">11~30명<input type="radio" name="org_size" value="11~30명"></div>
            <div class="seg-btn" onclick="pickSeg('org_size','31~50명',this)">31~50명<input type="radio" name="org_size" value="31~50명"></div>
            <div class="seg-btn" onclick="pickSeg('org_size','50명+',this)">50명+<input type="radio" name="org_size" value="50명+"></div>
          </div>
        </div>
        <div class="info-field">
          <label>AI 도구 사용 기간</label>
          <div class="seg-group">
            <div class="seg-btn" onclick="pickSeg('ai_duration','미사용',this)">미사용<input type="radio" name="ai_duration" value="미사용"></div>
            <div class="seg-btn" onclick="pickSeg('ai_duration','~3개월',this)">~3개월<input type="radio" name="ai_duration" value="~3개월"></div>
            <div class="seg-btn" onclick="pickSeg('ai_duration','3~12개월',this)">3~12개월<input type="radio" name="ai_duration" value="3~12개월"></div>
            <div class="seg-btn" onclick="pickSeg('ai_duration','1년+',this)">1년+<input type="radio" name="ai_duration" value="1년+"></div>
          </div>
        </div>
      </div>
      <button type="button" class="next-btn" onclick="nextSlide()">
        다음
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <!-- ===== Question Slides (generated by JS) ===== -->

  <!-- last slide removed: auto-submit after last question -->

</div>
</form>

<script>
// ── Question Data ──
const QUESTIONS = {{ questions | tojson }};
const PATTERN_OPTIONS = {{ pattern_options | tojson }};
const AGENCY_MEMBER = {{ agency_member | tojson }};
const AGENCY_LEADER = {{ agency_leader | tojson }};

window._role = '';

function pickSeg(name, val, el) {
  el.parentElement.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('input').checked = true;
  if (name === 'role') {
    window._role = val;
    const badge = document.getElementById('roleBadge');
    badge.textContent = val;
    badge.style.display = 'inline';
  }
}

// ── Build question slides ──
const slidesContainer = document.getElementById('slides');
let slideIdx = 2; // 0=intro, 1=demo

QUESTIONS.forEach((q, i) => {
  const div = document.createElement('div');
  div.className = 'slide';
  div.dataset.idx = slideIdx;
  div.dataset.qid = q.id;
  div.dataset.type = q.type;

  let inner = `<div class="slide-inner">`;
  inner += `<p class="q-part">Part ${q.part} · ${q.section}</p>`;
  inner += `<p class="q-text">${q.text}</p>`;
  if (q.sub) inner += `<p class="q-sub">${q.sub}</p>`;

  if (q.type === 'pattern') {
    if (q.examples) inner += `<p style="font-size:13px; color:#9ca3af; margin-bottom:16px; line-height:1.6; padding:10px 14px; background:#f5f5f0; border-radius:8px;">${q.examples}</p>`;
    inner += `<div class="choices" id="choices-${q.id}">`;
    PATTERN_OPTIONS.forEach((opt, j) => {
      inner += `<div class="choice" onclick="pickPattern('${q.id}','${opt.value}',this)">
        <span class="choice-key">${opt.label}</span>
        <span>${opt.desc}</span>
      </div>`;
    });
    inner += `</div>`;
    inner += `<input type="hidden" name="${q.id}" id="input-${q.id}">`;

    // Agency concept map
    inner += `<div class="agency-section" id="agency-${q.id}">`;
    inner += `<p class="agency-label">이 AI 활용은 어디서 시작됐나요?</p>`;
    inner += `<div class="cmap" id="agency-choices-${q.id}"></div>`;
    inner += `<input type="hidden" name="${q.id}_agency" id="input-${q.id}_agency">`;
    inner += `</div>`;

  } else if (q.type === 'likert') {
    const labels = ['전혀\n아니다','아니다','보통','그렇다','매우\n그렇다'];
    inner += `<div class="likert-row">`;
    for (let v = 1; v <= 5; v++) {
      inner += `<div class="likert-btn" onclick="pickLikert('${q.id}',${v},this)">
        <div class="l-num">${v}</div>
        <div class="l-label">${labels[v-1]}</div>
      </div>`;
    }
    inner += `</div>`;
    inner += `<input type="hidden" name="${q.id}" id="input-${q.id}">`;

  } else if (q.type === 'text') {
    inner += `<textarea class="text-input" name="${q.id}" id="input-${q.id}" placeholder="자유롭게 적어주세요 (없으면 '없음')"></textarea>`;
    inner += `<button type="button" class="next-btn" onclick="nextSlide()">다음
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>`;
    inner += `<button type="button" class="skip-btn" onclick="nextSlide()">건너뛰기</button>`;
  }

  inner += `</div>`;
  div.innerHTML = inner;
  slidesContainer.appendChild(div);
  slideIdx++;
});

const totalSlides = slideIdx;
let current = 0;

// ── Navigation ──
function showSlide(idx) {
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  const target = document.querySelector(`.slide[data-idx="${idx}"]`);
  if (target) target.classList.add('active');
  current = idx;

  // Progress
  const pct = Math.round((idx / (totalSlides - 1)) * 100);
  document.getElementById('progressFill').style.width = pct + '%';

  // Info text
  const countEl = document.getElementById('progressCount');
  if (idx === 0) countEl.textContent = '';
  else countEl.textContent = `${idx} / ${totalSlides - 1}`;

  // Back button
  document.getElementById('backBtn').style.display = idx > 0 ? 'block' : 'none';
}

function nextSlide() {
  if (current + 1 >= totalSlides) {
    document.getElementById('surveyForm').submit();
  } else {
    showSlide(current + 1);
  }
}
function prevSlide() { if (current > 0) showSlide(current - 1); }

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault();
    nextSlide();
  }
});

// ── Selections ──
function pickPattern(qid, val, el) {
  el.parentElement.querySelectorAll('.choice').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById(`input-${qid}`).value = val;

  const agencySection = document.getElementById(`agency-${qid}`);
  if (val !== 'na' && val !== '0') {
    agencySection.classList.add('show');
    renderAgency(qid);
  } else {
    agencySection.classList.remove('show');
    document.getElementById(`input-${qid}_agency`).value = '';
    setTimeout(nextSlide, 350);
  }
}

const AGENCY_NODES = {
  '리더': {
    top:    { value: 'c', emoji: '🏢', label: '상위 조직' },
    bottom: { value: 'a', emoji: '🙋', label: '개인 활용' },
    left:   { value: 'd', emoji: '🤝', label: '관련 팀' },
    right:  { value: 'b', emoji: '👥', label: '내가 팀에' },
  },
  '구성원': {
    top:    { value: 'c', emoji: '🏢', label: '상위 조직' },
    bottom: { value: 'a', emoji: '🙋', label: '개인 활용' },
    left:   { value: 'd', emoji: '🤝', label: '관련 팀' },
    right:  { value: 'b', emoji: '👥', label: '리더·동료' },
  },
};

function renderAgency(qid) {
  const role = window._role || '구성원';
  const nodes = AGENCY_NODES[role] || AGENCY_NODES['구성원'];
  const container = document.getElementById(`agency-choices-${qid}`);
  container.innerHTML = `
    <div class="cmap-line cmap-line-v top"></div>
    <div class="cmap-line cmap-line-v bottom"></div>
    <div class="cmap-line cmap-line-h left"></div>
    <div class="cmap-line cmap-line-h right"></div>
    <div class="cmap-center">🧑</div>
    <div class="cmap-node n-top" onclick="pickAgency('${qid}','${nodes.top.value}',this)">
      <span class="cn-emoji">${nodes.top.emoji}</span>
      <span class="cn-label">${nodes.top.label}</span>
    </div>
    <div class="cmap-node n-bottom" onclick="pickAgency('${qid}','${nodes.bottom.value}',this)">
      <span class="cn-emoji">${nodes.bottom.emoji}</span>
      <span class="cn-label">${nodes.bottom.label}</span>
    </div>
    <div class="cmap-node n-left" onclick="pickAgency('${qid}','${nodes.left.value}',this)">
      <span class="cn-emoji">${nodes.left.emoji}</span>
      <span class="cn-label">${nodes.left.label}</span>
    </div>
    <div class="cmap-node n-right" onclick="pickAgency('${qid}','${nodes.right.value}',this)">
      <span class="cn-emoji">${nodes.right.emoji}</span>
      <span class="cn-label">${nodes.right.label}</span>
    </div>
  `;
}

function pickAgency(qid, val, el) {
  el.parentElement.querySelectorAll('.cmap-node').forEach(n => n.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById(`input-${qid}_agency`).value = val;
  setTimeout(nextSlide, 400);
}

function pickLikert(qid, val, el) {
  el.parentElement.querySelectorAll('.likert-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById(`input-${qid}`).value = val;
  setTimeout(nextSlide, 300);
}

// Init — 인트로 건너뛰고 응답자 정보부터 시작
showSlide(1);
</script>
</body>
</html>
